name: Generate Food Snake

on:
  schedule:
    - cron: "0 0 * * *" # يشتغل كل يوم بالليل
  workflow_dispatch: # عشان نشغله بإيدنا حالاً

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # بيعمل generate للعبة الثعبان من الـ contributions بتاعتك
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # بيرفع الصور على فرع منفصل اسمه output عشان الـ README يقرأها بثبات
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
